text-color=#C2AE93
background-color=#040B0A
width=420
height=110
padding=10
border-size=3
border-radius=0
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32

# ANSI 6 (Cyan) - Ephemeral/Contextual Info
border-color=#40BE96

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

# ANSI 0 (Gray) - Low Urgency
[urgency=low]
border-color=#243342
default-timeout=3000

# ANSI 3 (Yellow) - Warnings ONLY
[urgency=normal summary~="[Ww]arning|[Aa]lert|[Aa]ttention"]
border-color=#DCAE3D

# ANSI 1 (Red) - Critical/Danger
[urgency=critical]
border-color=#B83E46
default-timeout=0
